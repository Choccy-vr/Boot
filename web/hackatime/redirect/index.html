<!--
  OAuth redirect handler for Hackatime authentication
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }
  </style>
  <script type="text/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');

    if (code || error) {
      // Store callback URL for Flutter app startup callback handler.
      sessionStorage.setItem('hackatime_callback', window.location.href);
      sessionStorage.setItem('hackclub_callback', window.location.href);

      // Redirect back into the app shell.
      window.location.href = '/dashboard/';
    } else {
      // Keep behavior predictable if this page is visited directly.
      window.location.href = '/dashboard/';
    }
  </script>
</head>

<body>
  <div class="loading">
    <h3>Finishing sign in...</h3>
  </div>
</body>

</html>
